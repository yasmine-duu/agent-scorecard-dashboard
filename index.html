<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PE Agent Quality Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; color: #1a1a2e; }

  header { background: #1a1a2e; color: white; padding: 18px 28px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { font-size: 13px; color: #8892b0; }

  .tabs { display: flex; gap: 0; background: white; border-bottom: 2px solid #e8eaf0; padding: 0 28px; }
  .tab { padding: 12px 20px; font-size: 14px; font-weight: 500; cursor: pointer; color: #666; border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .tab.active { color: #1a1a2e; border-bottom-color: #4f6ef7; }
  .tab:hover { color: #1a1a2e; }

  .panel { display: none; padding: 24px 28px; }
  .panel.active { display: block; }

  .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .controls label { font-size: 13px; color: #666; font-weight: 500; }
  select, input { padding: 7px 12px; border: 1px solid #dde1ee; border-radius: 6px; font-size: 13px; background: white; color: #1a1a2e; }
  select:focus, input:focus { outline: none; border-color: #4f6ef7; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: white; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .stat-card .label { font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .stat-card .value { font-size: 26px; font-weight: 700; }
  .stat-card .sub { font-size: 12px; color: #aaa; margin-top: 2px; }
  .good { color: #22c55e; }
  .warn { color: #f59e0b; }
  .bad  { color: #ef4444; }

  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-box { background: white; border-radius: 10px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .chart-box h3 { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 14px; }
  .chart-box canvas { max-height: 220px; }

  table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); font-size: 13px; }
  th { background: #f8f9fc; padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; color: #666; cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { background: #eef0f8; }
  th .sort-arrow { margin-left: 4px; color: #bbb; }
  td { padding: 9px 14px; border-top: 1px solid #f0f2f8; white-space: nowrap; }
  tr:hover td { background: #fafbff; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-green { background: #dcfce7; color: #15803d; }
  .badge-yellow { background: #fef9c3; color: #854d0e; }
  .badge-red { background: #fee2e2; color: #b91c1c; }
  .badge-gray { background: #f1f5f9; color: #64748b; }

  .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .top-box { background: white; border-radius: 10px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .top-box h3 { font-size: 13px; font-weight: 600; margin-bottom: 14px; }
  .top-box h3.green { color: #15803d; }
  .top-box h3.red { color: #b91c1c; }
  .rank-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #f0f2f8; font-size: 13px; }
  .rank-row:last-child { border-bottom: none; }
  .rank-num { width: 22px; height: 22px; border-radius: 50%; background: #f1f5f9; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #64748b; }
  .rank-name { flex: 1; font-weight: 500; }
  .rank-val { font-weight: 700; font-size: 14px; }

  .no-data { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

  @media (max-width: 700px) {
    .chart-row, .top-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>PE Agent Quality Dashboard</h1>
  <span>Payer Enrollment · Last 4 complete weeks</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('overview')">Overview</div>
  <div class="tab" onclick="showTab('agent')">Agent View</div>
  <div class="tab" onclick="showTab('rankings')">Rankings</div>
  <div class="tab" onclick="showTab('all')">All Agents</div>
</div>

<!-- OVERVIEW TAB -->
<div id="tab-overview" class="panel active">
  <div class="controls">
    <label>Week</label>
    <select id="overview-week" onchange="renderOverview()">
      <option value="all">All 4 weeks</option>
    </select>
  </div>
  <div class="stat-grid" id="overview-stats"></div>
  <div class="chart-row">
    <div class="chart-box">
      <h3>TNE % by Week</h3>
      <canvas id="chart-tne-trend"></canvas>
    </div>
    <div class="chart-box">
      <h3>Error Severity Mix by Week</h3>
      <canvas id="chart-severity-trend"></canvas>
    </div>
  </div>
</div>

<!-- AGENT VIEW TAB -->
<div id="tab-agent" class="panel">
  <div class="controls">
    <label>Agent</label>
    <select id="agent-select" onchange="renderAgentView()">
      <option value="">Select an agent...</option>
    </select>
  </div>
  <div id="agent-content"><p class="no-data">Select an agent above.</p></div>
</div>

<!-- RANKINGS TAB -->
<div id="tab-rankings" class="panel">
  <div class="controls">
    <label>Week</label>
    <select id="rankings-week" onchange="renderRankings()">
      <option value="all">All 4 weeks (aggregated)</option>
    </select>
    <label style="margin-left:12px">Min QC reviews</label>
    <input type="number" id="min-qc" value="5" min="1" style="width:70px" onchange="renderRankings()">
  </div>
  <div class="top-grid" id="rankings-content"></div>
</div>

<!-- ALL AGENTS TAB -->
<div id="tab-all" class="panel">
  <div class="controls">
    <label>Week</label>
    <select id="all-week" onchange="renderAll()">
      <option value="all">All 4 weeks (aggregated)</option>
    </select>
    <label style="margin-left:12px">Search</label>
    <input type="text" id="search-agent" placeholder="Agent name..." oninput="renderAll()" style="width:200px">
  </div>
  <table id="all-table">
    <thead id="all-thead"></thead>
    <tbody id="all-tbody"></tbody>
  </table>
</div>

// ---- helpers ----
const WEEKS = [...new Set(RAW.map(r => r.WEEK_START))].sort();

function n(v, decimals=1) {
  if (v === null || v === undefined || v === '') return null;
  return parseFloat(parseFloat(v).toFixed(decimals));
}

function colorForPct(val, metric) {
  if (val === null) return '';
  if (metric === 'tne') return val >= 40 ? 'good' : val >= 25 ? 'warn' : 'bad';
  if (metric === 'error') return val <= 30 ? 'good' : val <= 60 ? 'warn' : 'bad';
  if (metric === 'sla') return val >= 90 ? 'good' : val >= 70 ? 'warn' : 'bad';
  return '';
}

function badge(val, metric, suffix='%') {
  if (val === null) return '<span class="badge badge-gray">N/A</span>';
  const cls = colorForPct(val, metric);
  const badgeCls = cls === 'good' ? 'badge-green' : cls === 'warn' ? 'badge-yellow' : 'badge-red';
  return `<span class="badge ${badgeCls}">${val}${suffix}</span>`;
}

function aggRows(rows) {
  const qcVol = rows.reduce((s,r) => s + (r.QC_VOLUME||0), 0);
  const rework = rows.reduce((s,r) => s + (r.REWORK_COUNT||0), 0);
  const nnv = rows.reduce((s,r) => s + (r.NET_NEW_VOLUME||0), 0);
  const tne = rows.reduce((s,r) => s + (r.TNE_COUNT||0), 0);
  const err = rows.reduce((s,r) => s + (r.ERROR_COUNT||0), 0);
  const minor = rows.reduce((s,r) => s + (r.MINOR_COUNT||0), 0);
  const major = rows.reduce((s,r) => s + (r.MAJOR_COUNT||0), 0);
  const critical = rows.reduce((s,r) => s + (r.CRITICAL_COUNT||0), 0);
  const submitted = rows.reduce((s,r) => s + (r.SUBMITTED||0), 0);
  const slaHits = rows.reduce((s,r) => s + (r.SLA_HITS||0), 0);
  const slaMisses = rows.reduce((s,r) => s + (r.SLA_MISSES||0), 0);
  return {
    qcVol, rework, nnv, tne, err, minor, major, critical, submitted, slaHits, slaMisses,
    tnePct: nnv ? n(tne/nnv*100) : null,
    errorRatePct: nnv ? n(err/nnv*100) : null,
    nonCritPct: nnv ? n((minor+major)/nnv*100) : null,
    critPct: nnv ? n(critical/nnv*100) : null,
    slaPct: (slaHits+slaMisses) ? n(slaHits/(slaHits+slaMisses)*100) : null,
  };
}

// ---- populate selects ----
function populateWeekSelects() {
  const ids = ['overview-week','rankings-week','all-week'];
  ids.forEach(id => {
    const sel = document.getElementById(id);
    WEEKS.forEach(w => {
      const opt = document.createElement('option');
      opt.value = w; opt.text = w;
      sel.appendChild(opt);
    });
  });
}

function populateAgentSelect() {
  const agents = [...new Set(RAW.map(r => r.AGENT_NAME))].sort();
  const sel = document.getElementById('agent-select');
  agents.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a; opt.text = a;
    sel.appendChild(opt);
  });
}

// ---- OVERVIEW ----
let chartTne, chartSev;
function renderOverview() {
  const week = document.getElementById('overview-week').value;
  const rows = week === 'all' ? RAW : RAW.filter(r => r.WEEK_START === week);
  const agg = aggRows(rows);

  document.getElementById('overview-stats').innerHTML = `
    <div class="stat-card">
      <div class="label">QC Volume</div>
      <div class="value">${agg.qcVol.toLocaleString()}</div>
      <div class="sub">${agg.rework} reworks</div>
    </div>
    <div class="stat-card">
      <div class="label">Net New Volume</div>
      <div class="value">${agg.nnv.toLocaleString()}</div>
      <div class="sub">excl. reworks</div>
    </div>
    <div class="stat-card">
      <div class="label">TNE %</div>
      <div class="value ${colorForPct(agg.tnePct,'tne')}">${agg.tnePct ?? 'N/A'}%</div>
      <div class="sub">${agg.tne} true no-error</div>
    </div>
    <div class="stat-card">
      <div class="label">Error Rate</div>
      <div class="value ${colorForPct(agg.errorRatePct,'error')}">${agg.errorRatePct ?? 'N/A'}%</div>
      <div class="sub">${agg.err} errors</div>
    </div>
    <div class="stat-card">
      <div class="label">Critical Rate</div>
      <div class="value ${colorForPct(agg.critPct,'error')}">${agg.critPct ?? 'N/A'}%</div>
      <div class="sub">${agg.critical} critical</div>
    </div>
    <div class="stat-card">
      <div class="label">SLA %</div>
      <div class="value ${colorForPct(agg.slaPct,'sla')}">${agg.slaPct ?? 'N/A'}%</div>
      <div class="sub">${agg.submitted} submitted</div>
    </div>
  `;

  // TNE trend chart
  const weeklyTne = WEEKS.map(w => {
    const a = aggRows(RAW.filter(r => r.WEEK_START === w));
    return a.tnePct;
  });
  const weeklyErr = WEEKS.map(w => {
    const a = aggRows(RAW.filter(r => r.WEEK_START === w));
    return a.errorRatePct;
  });

  if (chartTne) chartTne.destroy();
  chartTne = new Chart(document.getElementById('chart-tne-trend'), {
    type: 'line',
    data: {
      labels: WEEKS,
      datasets: [
        { label: 'TNE %', data: weeklyTne, borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,.1)', tension: .3, fill: true },
        { label: 'Error Rate %', data: weeklyErr, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,.05)', tension: .3, fill: false },
      ]
    },
    options: { scales: { y: { min: 0, max: 100, ticks: { callback: v => v+'%' } } }, plugins: { legend: { position: 'bottom' } } }
  });

  // Severity mix
  const minor = WEEKS.map(w => aggRows(RAW.filter(r => r.WEEK_START === w)).minor);
  const major = WEEKS.map(w => aggRows(RAW.filter(r => r.WEEK_START === w)).major);
  const critical = WEEKS.map(w => aggRows(RAW.filter(r => r.WEEK_START === w)).critical);
  const tneC = WEEKS.map(w => aggRows(RAW.filter(r => r.WEEK_START === w)).tne);

  if (chartSev) chartSev.destroy();
  chartSev = new Chart(document.getElementById('chart-severity-trend'), {
    type: 'bar',
    data: {
      labels: WEEKS,
      datasets: [
        { label: 'True No Error', data: tneC, backgroundColor: '#22c55e' },
        { label: 'Minor', data: minor, backgroundColor: '#a3e635' },
        { label: 'Major', data: major, backgroundColor: '#f59e0b' },
        { label: 'Critical', data: critical, backgroundColor: '#ef4444' },
      ]
    },
    options: { scales: { x: { stacked: true }, y: { stacked: true } }, plugins: { legend: { position: 'bottom' } } }
  });
}

// ---- AGENT VIEW ----

  if (!agent) return;
  const rows = RAW.filter(r => r.AGENT_NAME === agent);
  const agg = aggRows(rows);
  const byWeek = WEEKS.map(w => aggRows(rows.filter(r => r.WEEK_START === w)));

  document.getElementById('agent-content').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="label">QC Volume</div>
        <div class="value">${agg.qcVol || 'N/A'}</div>
        <div class="sub">${agg.rework} reworks</div>
      </div>
      <div class="stat-card">
        <div class="label">Net New Volume</div>
        <div class="value">${agg.nnv || 'N/A'}</div>
      </div>
      <div class="stat-card">
        <div class="label">TNE %</div>
        <div class="value ${colorForPct(agg.tnePct,'tne')}">${agg.tnePct !== null ? agg.tnePct+'%' : 'N/A'}</div>
        <div class="sub">${agg.tne} true no-error</div>
      </div>
      <div class="stat-card">
        <div class="label">Error Rate</div>
        <div class="value ${colorForPct(agg.errorRatePct,'error')}">${agg.errorRatePct !== null ? agg.errorRatePct+'%' : 'N/A'}</div>
      </div>
      <div class="stat-card">
        <div class="label">Critical Rate</div>
        <div class="value ${colorForPct(agg.critPct,'error')}">${agg.critPct !== null ? agg.critPct+'%' : 'N/A'}</div>
        <div class="sub">${agg.critical} critical</div>
      </div>
      <div class="stat-card">
        <div class="label">SLA %</div>
        <div class="value ${colorForPct(agg.slaPct,'sla')}">${agg.slaPct !== null ? agg.slaPct+'%' : 'N/A'}</div>
        <div class="sub">${agg.submitted} submitted</div>
      </div>
    </div>
    <div class="chart-row">
      <div class="chart-box">
        <h3>TNE % vs Error Rate by Week</h3>
        <canvas id="chart-agent-tne"></canvas>
      </div>
      <div class="chart-box">
        <h3>Error Severity by Week</h3>
        <canvas id="chart-agent-sev"></canvas>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Week</th><th>Net New Vol</th><th>TNE %</th><th>Error Rate</th>
          <th>Critical Rate</th><th>Major Rate</th><th>Minor Rate</th>
          <th>SLA %</th><th>Submitted</th>
        </tr>
      </thead>
      <tbody>
        ${WEEKS.map((w,i) => {
          const a = byWeek[i];
          return `<tr>
            <td>${w}</td>
            <td>${a.nnv || '-'}</td>
            <td>${badge(a.tnePct,'tne')}</td>
            <td>${badge(a.errorRatePct,'error')}</td>
            <td>${badge(a.critPct,'error')}</td>
            <td>${a.nonCritPct !== null ? a.major+' ('+n((a.major/(a.nnv||1))*100)+'%)' : '-'}</td>
            <td>${a.nonCritPct !== null ? a.minor+' ('+n((a.minor/(a.nnv||1))*100)+'%)' : '-'}</td>
            <td>${badge(a.slaPct,'sla')}</td>
            <td>${a.submitted || '-'}</td>

        }).join('')}

  if (chartAgentTne) chartAgentTne.destroy();
  chartAgentTne = new Chart(document.getElementById('chart-agent-tne'), {
    type: 'line',
    data: {
      labels: WEEKS,
      datasets: [
        { label: 'TNE %', data: byWeek.map(a => a.tnePct), borderColor: '#22c55e', tension: .3 },
        { label: 'Error Rate %', data: byWeek.map(a => a.errorRatePct), borderColor: '#ef4444', tension: .3 },
      ]
    },
    options: { scales: { y: { min: 0, max: 100, ticks: { callback: v => v+'%' } } }, plugins: { legend: { position: 'bottom' } } }
  });

  if (chartAgentSev) chartAgentSev.destroy();
  chartAgentSev = new Chart(document.getElementById('chart-agent-sev'), {
    type: 'bar',

      labels: WEEKS,

      ]
    },
    options: { scales: { x: { stacked: true }, y: { stacked: true } }, plugins: { legend: { position: 'bottom' } } }
  });
}

// ---- RANKINGS ----
function renderRankings() {
  const week = document.getElementById('rankings-week').value;
  const minQc = parseInt(document.getElementById('min-qc').value) || 1;
  const rows = week === 'all' ? RAW : RAW.filter(r => r.WEEK_START === week);

  const agents = [...new Set(rows.map(r => r.AGENT_NAME))];
  const agentAggs = agents.map(a => ({ name: a, ...aggRows(rows.filter(r => r.AGENT_NAME === a)) }))
    .filter(a => a.nnv >= minQc && a.tnePct !== null);

  function topList(sorted, valueKey, label, suffix='%') {
    return sorted.slice(0,10).map((a,i) => `
      <div class="rank-row">
        <div class="rank-num">${i+1}</div>
        <div class="rank-name">${a.name}</div>
        <div class="rank-val">${a[valueKey] !== null ? a[valueKey]+suffix : 'N/A'}</div>
      </div>`).join('');
  }

  const byTneDesc = [...agentAggs].sort((a,b) => b.tnePct - a.tnePct);
  const byTneAsc  = [...agentAggs].sort((a,b) => a.tnePct - b.tnePct);
  const byErrDesc = [...agentAggs].sort((a,b) => b.errorRatePct - a.errorRatePct);
  const byCritDesc = [...agentAggs].sort((a,b) => b.critPct - a.critPct);

  const slaBased = agentAggs.filter(a => a.slaPct !== null);
  const bySlaDesc = [...slaBased].sort((a,b) => b.slaPct - a.slaPct);
  const bySlaAsc  = [...slaBased].sort((a,b) => a.slaPct - b.slaPct);

  document.getElementById('rankings-content').innerHTML = `
    <div class="top-box">
      <h3 class="green">Top TNE % (highest first)</h3>
      ${topList(byTneDesc, 'tnePct')}
    </div>
    <div class="top-box">
      <h3 class="red">Lowest TNE % (needs attention)</h3>
      ${topList(byTneAsc, 'tnePct')}
    </div>
    <div class="top-box">
      <h3 class="green">Best SLA % (highest first)</h3>
      ${topList(bySlaDesc, 'slaPct')}
    </div>
    <div class="top-box">
      <h3 class="red">Highest Critical Rate</h3>
      ${topList(byCritDesc, 'critPct')}
    </div>
  `;
}

// ---- ALL AGENTS ----
let allSortCol = 'tnePct', allSortDir = -1;
function renderAll() {
  const week = document.getElementById('all-week').value;
  const search = document.getElementById('search-agent').value.toLowerCase();
  const rows = week === 'all' ? RAW : RAW.filter(r => r.WEEK_START === week);

  const agents = [...new Set(rows.map(r => r.AGENT_NAME))];
  let agentAggs = agents
    .map(a => ({ name: a, ...aggRows(rows.filter(r => r.AGENT_NAME === a)) }))
    .filter(a => a.name.toLowerCase().includes(search));

  agentAggs.sort((a,b) => {
    const av = a[allSortCol], bv = b[allSortCol];
    if (av === null && bv === null) return 0;
    if (av === null) return 1;
    if (bv === null) return -1;
    return allSortDir * (av > bv ? 1 : -1);
  });

  const cols = [
    { key: 'name', label: 'Agent' },
    { key: 'nnv', label: 'Net New Vol' },
    { key: 'qcVol', label: 'QC Vol' },
    { key: 'rework', label: 'Reworks' },
    { key: 'tnePct', label: 'TNE %' },
    { key: 'errorRatePct', label: 'Error Rate' },
    { key: 'nonCritPct', label: 'Non-Critical Err %' },
    { key: 'critPct', label: 'Critical Rate' },
    { key: 'slaPct', label: 'SLA %' },
    { key: 'submitted', label: 'Submitted' },
  ];

  document.getElementById('all-thead').innerHTML = `<tr>${cols.map(c =>
    `<th onclick="sortAll('${c.key}')">${c.label} <span class="sort-arrow">${allSortCol===c.key ? (allSortDir>0?'▲':'▼') : '⇅'}</span></th>`
  ).join('')}</tr>`;

  document.getElementById('all-tbody').innerHTML = agentAggs.map(a => `
    <tr>
      <td><strong>${a.name}</strong></td>
      <td>${a.nnv ?? '-'}</td>
      <td>${a.qcVol ?? '-'}</td>
      <td>${a.rework ?? '-'}</td>
      <td>${badge(a.tnePct,'tne')}</td>
      <td>${badge(a.errorRatePct,'error')}</td>
      <td>${a.nonCritPct !== null ? a.nonCritPct+'%' : '<span class="badge badge-gray">N/A</span>'}</td>
      <td>${badge(a.critPct,'error')}</td>
      <td>${badge(a.slaPct,'sla')}</td>
      <td>${a.submitted || '-'}</td>
    </tr>`).join('');
}

function sortAll(col) {
  if (allSortCol === col) allSortDir *= -1;
  else { allSortCol = col; allSortDir = -1; }
  renderAll();
}

// ---- TAB SWITCHING ----
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['overview','agent','rankings','all'][i]===name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (name === 'overview') renderOverview();
  if (name === 'rankings') renderRankings();
  if (name === 'all') renderAll();
}

// ---- INIT ----
populateWeekSelects();
populateAgentSelect();
renderOverview();
renderAll();
</script>
